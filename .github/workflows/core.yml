name: Salesforce Core (Reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: "'validate' for PR dry-run, 'deploy' for post-merge"
        required: true
        type: string
      environment:
        description: "GitHub Environment to activate: 'Non-Production' or 'Production'"
        required: true
        type: string

jobs:
  sf-job:
    name: Salesforce ${{ inputs.mode == 'deploy' && 'Deploy' || 'Validate' }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest

    timeout-minutes: 70

    environment: ${{ inputs.environment }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install sfdx-git-delta
        shell: bash
        run: npm install --global sfdx-git-delta

      - name: Verify Salesforce CLI and sfdx-git-delta versions
        shell: bash
        run: |
          echo "-- Salesforce CLI --"
          sf version
          echo "-- sfdx-git-delta --"
          sgd --version
      - name: Write JWT key to file
        shell: bash
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce with JWT
        shell: bash
        run: |
          sf org login jwt \
            --client-id    "${{ secrets.CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username     "${{ secrets.DEPLOYMENT_USER_NAME }}" \
            --instance-url "${{ vars.INSTANCE_URL }}" \
            --alias        ci-org

      - name: Verify authenticated org
        shell: bash
        run: sf org display --target-org ci-org

      - name: Resolve delta base SHA
        id: delta
        shell: bash
        run: |
          TAG="last-deploy-${{ inputs.environment }}"

          if [ "${{ inputs.mode }}" = "validate" ]; then
            # github.event.pull_request is available here because reusable
            # workflows inherit the caller's event context.
            FROM="${{ github.event.pull_request.base.sha }}"
            SOURCE="PR base SHA (github.event.pull_request.base.sha)"
          else
            # Deploy mode — resolve SHA from the environment-specific tag.
            if git rev-parse --verify "refs/tags/$TAG" > /dev/null 2>&1; then
              FROM=$(git rev-list -n 1 "refs/tags/$TAG")
              SOURCE="git tag '$TAG'"
            else
              FROM=""
              SOURCE="tag '$TAG' not found — this is likely the first deploy"
            fi
          fi

          echo ""
          if [ -z "$FROM" ]; then
            echo "No base SHA available ($SOURCE)."
            echo "Falling back to full force-app deploy."
            echo "deploy_mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "Base SHA : $FROM"
            echo "Source   : $SOURCE"
            echo "deploy_mode=delta" >> "$GITHUB_OUTPUT"
            echo "from_sha=$FROM"    >> "$GITHUB_OUTPUT"
          fi

      - name: Generate sfdx-git-delta package
        id: sgd
        if: steps.delta.outputs.deploy_mode == 'delta'
        shell: bash
        run: |
          mkdir -p delta

          sgd source delta \
            --to             HEAD \
            --from           "${{ steps.delta.outputs.from_sha }}" \
            --output         ./delta \
            --generate-delta \
            --source-dir     force-app

          echo ""
          echo "--- delta/package/package.xml ---"
          cat delta/package/package.xml

          echo ""
          echo "--- delta/destructiveChanges/destructiveChanges.xml ---"
          cat delta/destructiveChanges/destructiveChanges.xml 2>/dev/null \
            || echo "(file not present — no components were deleted)"

          # Detect whether the package has any metadata types to deploy.
          # If package.xml exists but contains no <types> the manifest is
          # empty — deploying it would be a no-op and can confuse the CLI.
          if grep -q "<types>" delta/package/package.xml 2>/dev/null; then
            echo ""
            echo "Delta package contains metadata changes — proceeding."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "Delta package is empty — no metadata changed between commits."
            echo "Skipping deploy/validate."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate delta (dry-run)
        if: |
          inputs.mode == 'validate' &&
          steps.delta.outputs.deploy_mode == 'delta' &&
          steps.sgd.outputs.has_changes == 'true'
        shell: bash
        run: |
          # Only pass --pre-destructive-changes if the file actually exists.
          # The flag with a missing file causes an sf CLI error.
          DESTRUCTIVE=""
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            DESTRUCTIVE="--pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi

          sf project deploy validate \
            --manifest    delta/package/package.xml \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            $DESTRUCTIVE \
            --wait        60

      - name: Validate full force-app (dry-run — no delta base available)
        if: inputs.mode == 'validate' && steps.delta.outputs.deploy_mode == 'full'
        shell: bash
        run: |
          sf project deploy validate \
            --source-dir  force-app \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            --wait        60

      - name: Deploy delta metadata
        if: |
          inputs.mode == 'deploy' &&
          steps.delta.outputs.deploy_mode == 'delta' &&
          steps.sgd.outputs.has_changes == 'true'
        shell: bash
        run: |
          DESTRUCTIVE=""
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            DESTRUCTIVE="--pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi

          sf project deploy start \
            --manifest    delta/package/package.xml \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            $DESTRUCTIVE \
            --wait        60

      - name: Deploy full force-app (first run — no tag exists yet)
        if: inputs.mode == 'deploy' && steps.delta.outputs.deploy_mode == 'full'
        shell: bash
        run: |
          sf project deploy start \
            --source-dir  force-app \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            --wait        60

      - name: Tag successful deploy commit
        if: |
          inputs.mode == 'deploy' &&
          success() &&
          (steps.delta.outputs.deploy_mode == 'full' || steps.sgd.outputs.has_changes == 'true')
        shell: bash
        run: |
          TAG="last-deploy-${{ inputs.environment }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin -f "refs/tags/$TAG"
          echo "Tag '$TAG' → $(git rev-parse HEAD)"

      - name: Remove JWT key file
        if: always()
        shell: bash
        run: rm -f server.key
