name: Salesforce Core (Reusable file)

on:
  workflow_call:
    inputs:
      mode:
        description: "'validate' for PR dry-run, 'deploy' for post-merge"
        required: true
        type: string
      environment:
        description: "GitHub Environment to activate: 'Non-Production' or 'Production'"
        required: true
        type: string

jobs:
  sf-job:
    name: Salesforce ${{inputs.mode == 'deploy' && 'Deploy' || 'Validate'}} → ${{inputs.environment}}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    environment: ${{inputs.environment}}

    permissions:
      contents: read

    env:
      SF_AUTOUPDATE_DISABLE: "true"
      SF_DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        shell: bash
        run: sf version

      - name: Install sfdx-git-delta plugin
        shell: bash
        run: |
          echo y | sf plugins install sfdx-git-delta
          echo "----- Installed plugins -----"
          sf plugins
          # Hard fail early if the plugin didn't register correctly.
          sf plugins inspect sfdx-git-delta > /dev/null \
            || {echo "::error::sfdx-git-delta plugin failed to install"; exit 1;}
          sf sgd source delta --help > /dev/null \
            || {echo "::error::'sf sgd source delta' is not registered"; exit 1;}

      - name: Write JWT key to file
        shell: bash
        run: |
          echo "${{secrets.JWT_SERVER_KEY}}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce with JWT
        shell: bash
        run: |
          sf org login jwt \
            --client-id    "${{secrets.CONSUMER_KEY}}" \
            --jwt-key-file server.key \
            --username     "${{secrets.DEPLOYMENT_USER_NAME}}" \
            --instance-url "${{vars.INSTANCE_URL}}" \
            --alias        ci-org

      - name: Verify authenticated org
        shell: bash
        run: sf org display --target-org ci-org

      - name: Determine delta commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          EVENT="${{github.event_name}}"

          if [["$EVENT" == "pull_request"]]; then
            FROM_REF="origin/${{github.base_ref}}"
            TO_REF="HEAD"
            USE_DELTA="true"
          elif [["$EVENT" == "push"]]; then
            BEFORE="${{github.event.before}}"
            if [["$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE"]]; then
              echo "::warning::No previous commit on this branch; falling back to full deploy."
              USE_DELTA="false"; FROM_REF=""; TO_REF=""
            else
              FROM_REF="$BEFORE"
              TO_REF="${{github.sha}}"
              USE_DELTA="true"
            fi
          else
            # workflow_dispatch (manual): no natural diff base → do a full deploy.
            echo "::notice::Manual run detected; performing a full deploy of force-app."
            USE_DELTA="false"; FROM_REF=""; TO_REF=""
          fi

          echo "from_ref=$FROM_REF"   >> "$GITHUB_OUTPUT"
          echo "to_ref=$TO_REF"       >> "$GITHUB_OUTPUT"
          echo "use_delta=$USE_DELTA" >> "$GITHUB_OUTPUT"

          echo "FROM = $FROM_REF"
          echo "TO   = $TO_REF"
          echo "USE_DELTA = $USE_DELTA"

      - name: Generate delta package
        if: steps.range.outputs.use_delta == 'true'
        id: delta
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p delta

          # --generate-delta is REQUIRED to actually copy changed source files.
          # Without it you only get a package.xml and the deploy will have nothing to send.
          sf sgd source delta \
            --from        "${{steps.range.outputs.from_ref}}" \
            --to          "${{steps.range.outputs.to_ref}}" \
            --output-dir  delta \
            --source-dir  force-app \
            --generate-delta

          echo "-- delta/package/package.xml --"
          cat delta/package/package.xml || true
          echo "-- delta/destructiveChanges/destructiveChanges.xml --"
          cat delta/destructiveChanges/destructiveChanges.xml || true
          echo "-- delta tree --"
          find delta -maxdepth 4 -type f | sort

          HAS_CHANGES="false"
          HAS_DESTRUCTIVE="false"
          if [-f delta/package/package.xml] && grep -q '<types>' delta/package/package.xml; then
            HAS_CHANGES="true"
          fi
          if [-f delta/destructiveChanges/destructiveChanges.xml] && grep -q '<types>' delta/destructiveChanges/destructiveChanges.xml; then
            HAS_DESTRUCTIVE="true"
          fi

          echo "has_changes=$HAS_CHANGES"         >> "$GITHUB_OUTPUT"
          echo "has_destructive=$HAS_DESTRUCTIVE" >> "$GITHUB_OUTPUT"

          if [["$HAS_CHANGES" == "false" && "$HAS_DESTRUCTIVE" == "false"]]; then
            echo "::notice::No deployable metadata changes in this commit range."
          fi

      - name: Validation (full source case, meaning first push)
        if: inputs.mode == 'validate' && steps.range.outputs.use_delta != 'true'
        shell: bash
        run: |
          sf project deploy validate \
            --source-dir  force-app \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            --wait        60

      - name: Validation (delta)
        if: inputs.mode == 'validate' && steps.range.outputs.use_delta == 'true' && (steps.delta.outputs.has_changes == 'true' || steps.delta.outputs.has_destructive == 'true')
        shell: bash
        run: |
          ARGS=(--manifest delta/package/package.xml
                --target-org ci-org
                --test-level RunLocalTests
                --wait 60)
          if [["${{steps.delta.outputs.has_destructive}}" == "true"]]; then
            ARGS+=(--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml)
          fi
          sf project deploy validate "${ARGS[@]}"

      - name: Validation skipped (no changes in metadata)
        if: inputs.mode == 'validate' && steps.range.outputs.use_delta == 'true' && steps.delta.outputs.has_changes != 'true' && steps.delta.outputs.has_destructive != 'true'
        shell: bash
        run: echo "::notice::No metadata changes to validate."

      - name: Deployment (full source case, meaning first push)
        if: inputs.mode == 'deploy' && steps.range.outputs.use_delta != 'true'
        shell: bash
        run: |
          sf project deploy start \
            --source-dir  force-app \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            --wait        60

      - name: Deployment (delta)
        if: inputs.mode == 'deploy' && steps.range.outputs.use_delta == 'true' && (steps.delta.outputs.has_changes == 'true' || steps.delta.outputs.has_destructive == 'true')
        shell: bash
        run: |
          ARGS=(--manifest delta/package/package.xml
                --target-org ci-org
                --test-level RunLocalTests
                --wait 60)
          if [[ "${{steps.delta.outputs.has_destructive}}" == "true" ]]; then
            ARGS+=(--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml)
          fi
          sf project deploy start "${ARGS[@]}"

      - name: Deployment skipped (no changes in metadata)
        if: inputs.mode == 'deploy' && steps.range.outputs.use_delta == 'true' && steps.delta.outputs.has_changes != 'true' && steps.delta.outputs.has_destructive != 'true'
        shell: bash
        run: echo "::notice::No metadata changes to deploy."

      - name: Remove JWT key file
        if: always()
        shell: bash
        run: rm -f server.key
