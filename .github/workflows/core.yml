name: Salesforce Core (Reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: "'validate' for PR dry-run, 'deploy' for post-merge"
        required: true
        type: string
      environment:
        description: "GitHub Environment to activate: 'Non-Production' or 'Production'"
        required: true
        type: string

jobs:
  sf-job:
    name: Salesforce ${{ inputs.mode == 'deploy' && 'Deploy' || 'Validate' }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    environment: ${{ inputs.environment }}

    container:
      image: ${{ vars.SF_CI_IMAGE }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    concurrency:
      group: sf-${{ inputs.mode }}-${{ github.event.pull_request.number || inputs.environment }}
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Mark workspace as safe for git
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Merge target branch locally
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Fetching latest origin/${{ github.base_ref }}..."
          git fetch origin ${{ github.base_ref }}

          echo "Merging origin/${{ github.base_ref }} into PR branch..."
          git merge origin/${{ github.base_ref }} --no-edit

          echo "Local merge succeeded. HEAD is now:"
          git log --oneline -1

      - name: Verify Salesforce CLI and sgd
        shell: bash
        run: |
          sf version
          sf sgd source delta --help > /dev/null

      - name: Write JWT key to file
        shell: bash
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce with JWT
        shell: bash
        run: |
          sf org login jwt \
            --client-id    "${{ secrets.CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username     "${{ secrets.DEPLOYMENT_USER_NAME }}" \
            --instance-url "${{ vars.INSTANCE_URL }}" \
            --alias        "${{ inputs.environment}}"

      - name: Verify authenticated org
        shell: bash
        run: sf org display --target-org "${{ inputs.environment }}"

      - name: Determine delta commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "from_ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "from_ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

          echo "to_ref=HEAD" >> "$GITHUB_OUTPUT"

      - name: Generate delta package
        id: delta
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p delta

          sf sgd source delta \
            --from        "${{ steps.range.outputs.from_ref }}" \
            --to          "${{ steps.range.outputs.to_ref }}" \
            --output-dir  delta \
            --source-dir  force-app \
            --generate-delta

          cat delta/package/package.xml || true
          cat delta/destructiveChanges/destructiveChanges.xml || true
          find delta -maxdepth 4 -type f | sort

          HAS_CHANGES="false"
          HAS_DESTRUCTIVE="false"
          if [ -f delta/package/package.xml ] && grep -q '<types>' delta/package/package.xml; then
            HAS_CHANGES="true"
          fi
          if [ -f delta/destructiveChanges/destructiveChanges.xml ] && grep -q '<types>' delta/destructiveChanges/destructiveChanges.xml; then
            HAS_DESTRUCTIVE="true"
          fi

          echo "has_changes=$HAS_CHANGES"         >> "$GITHUB_OUTPUT"
          echo "has_destructive=$HAS_DESTRUCTIVE" >> "$GITHUB_OUTPUT"

          if [[ "$HAS_CHANGES" == "false" && "$HAS_DESTRUCTIVE" == "false" ]]; then
            echo "::notice::No deployable metadata changes in this commit range."
          fi

      # ---------- VALIDATE ----------

      - name: Validate (delta)
        if: inputs.mode == 'validate' && (steps.delta.outputs.has_changes == 'true' || steps.delta.outputs.has_destructive == 'true')
        shell: bash
        run: |
          sf project deploy validate \
            --manifest   delta/package/package.xml \
            ${{ steps.delta.outputs.has_destructive == 'true' && '--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml' || '' }} \
            --target-org "${{ inputs.environment }}" \
            --test-level RunLocalTests \
            --wait       60

      - name: Validate skipped (no changes)
        if: inputs.mode == 'validate' && steps.delta.outputs.has_changes != 'true' && steps.delta.outputs.has_destructive != 'true'
        shell: bash
        run: echo "::notice::No metadata changes to validate."

      # ---------- DEPLOY ----------

      - name: Deploy (delta)
        if: inputs.mode == 'deploy' && (steps.delta.outputs.has_changes == 'true' || steps.delta.outputs.has_destructive == 'true')
        shell: bash
        run: |
          sf project deploy start \
            --manifest   delta/package/package.xml \
            ${{ steps.delta.outputs.has_destructive == 'true' && '--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml' || '' }} \
            --target-org "${{ inputs.environment }}" \
            --test-level RunLocalTests \
            --wait       60

      - name: Deploy skipped (no changes)
        if: inputs.mode == 'deploy' && steps.delta.outputs.has_changes != 'true' && steps.delta.outputs.has_destructive != 'true'
        shell: bash
        run: echo "::notice::No metadata changes to deploy."

      - name: Remove JWT key file
        if: always()
        shell: bash
        run: rm -f server.key
