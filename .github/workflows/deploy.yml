name: Deploy Salesforce Metadata

# Runs on every push to dev or main (i.e. after a PR is merged).
# Environment is determined by the target branch, not the source branch.
# workflow_dispatch on a non-main branch deploys to nonprod.

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/core.yml
    with:
      mode: deploy
      # github.ref_name is the branch that was pushed to.
      environment: ${{ github.ref_name == 'main' && 'prod' || 'nonprod' }}
    secrets: inherit
