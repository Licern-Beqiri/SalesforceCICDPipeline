name: Continuous Integration Checks

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    name: JS Checks (Jest + ESLint)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Salesforce project structure
        shell: bash
        run: |
          test -f sfdx-project.json \
            || { echo "::error::sfdx-project.json is missing"; exit 1; }
          test -d force-app \
            || { echo "::error::force-app directory is missing"; exit 1; }

      - name: Install project dependencies
        shell: bash
        run: npm ci

      - name: Run LWC Jest tests
        shell: bash
        run: npm test

      - name: Run ESLint
        shell: bash
        run: npm run lint
