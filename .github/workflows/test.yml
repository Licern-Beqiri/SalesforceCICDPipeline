name: Continuous Integration Checks

on:
  push:
    branches:
      - dev
      - main
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - "release/**"
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Salesforce project structure
        shell: bash
        run: |
          test -f sfdx-project.json || (echo "Missing sfdx-project.json" && exit 1)
          test -d force-app || (echo "Missing force-app directory" && exit 1)

      - name: Install project dependencies if package.json exists
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping dependency install"
          fi

      - name: Run tests if available
        shell: bash
        run: |
          if [ -f package.json ] && npm run | grep -q " test"; then
            npm test -- --passWithNoTests
          else
            echo "No test script found, skipping tests"
          fi

      - name: Run lint if available
        shell: bash
        run: |
          if [ -f package.json ] && npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script found, skipping lint"
          fi
