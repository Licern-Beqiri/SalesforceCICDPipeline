name: Continuous Integration Checks

# Intentionally does NOT run on push to dev/main.
#
# Rationale: these checks already ran (and passed) on the PR that produced
# the merge commit. Re-running them post-merge creates noise, wastes minutes,
# and — most importantly — cannot gate anything because the merge already
# happened. If you want a post-merge canary, add a separate scheduled workflow.
#
# workflow_dispatch is kept so engineers can trigger manually when needed.

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    name: JS Checks (Jest + ESLint)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Validates that the two files every Salesforce CLI command depends on
      # are actually present. Catches accidental deletions early, before any
      # org connection is attempted.
      - name: Validate Salesforce project structure
        shell: bash
        run: |
          test -f sfdx-project.json \
            || { echo "::error::sfdx-project.json is missing"; exit 1; }
          test -d force-app \
            || { echo "::error::force-app directory is missing"; exit 1; }

      - name: Install project dependencies
        shell: bash
        run: npm ci

      - name: Run LWC Jest tests
        shell: bash
        # The test script already includes --passWithNoTests so projects
        # without any spec files don't fail. See package.json "test" script.
        run: npm test

      - name: Run ESLint
        shell: bash
        run: npm run lint
