name: Continuous Integration Test

on:
  push:
    branches:
      - dev
      - main
      - 'feature/**'
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf version

      - name: Validate Salesforce project structure
        run: |
          test -f sfdx-project.json || (echo "Missing sfdx-project.json" && exit 1)
          test -d force-app || (echo "Missing force-app directory" && exit 1)

      - name: Install project dependencies if package.json exists
        run: |
         if [ -f package.json ]; then
          npm install
         else
          echo "No package.json found, skipping npm install"
         fi

      - name: Run Jest tests if available
        run: |
         if [ -f package.json ] && npm run | grep -q "test"; then
          npm test -- -- --passWithNoTests
         else
          echo "No npm test script found, skipping Jest tests"
         fi

      - name: Check formatting / lint if available
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script found, skipping lint"
          fi