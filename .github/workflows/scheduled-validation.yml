name: Scheduled Full Validation

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

jobs:
  resolve-image:
    name: Resolve container image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.name }}
    steps:
      - name: Lowercase image path
        id: img
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/sf-ci:latest" >> "$GITHUB_OUTPUT"

  full-validate:
    name: Full source validation → Non-Production
    needs: resolve-image
    runs-on: ubuntu-latest
    timeout-minutes: 70
    environment: Non-Production

    container:
      image: ${{ needs.resolve-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    concurrency:
      group: sf-scheduled-validation
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify Salesforce CLI
        shell: bash
        run: sf version

      - name: Write JWT key to file
        shell: bash
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce with JWT
        shell: bash
        run: |
          sf org login jwt \
            --client-id    "${{ secrets.CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username     "${{ secrets.DEPLOYMENT_USER_NAME }}" \
            --instance-url "${{ vars.INSTANCE_URL }}" \
            --alias        ci-org

      - name: Verify authenticated org
        shell: bash
        run: sf org display --target-org ci-org

      - name: Validate full source against org
        shell: bash
        run: |
          sf project deploy validate \
            --source-dir  force-app \
            --target-org  ci-org \
            --test-level  RunLocalTests \
            --wait        60

      - name: Remove JWT key file
        if: always()
        shell: bash
        run: rm -f server.key
